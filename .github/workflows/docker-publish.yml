name: Build and Push Docker Image
on:
  push:
    branches:
      - main

permissions:
  contents: write    # Required for creating and pushing tags

jobs:
  create-tag-release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: previoustag
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "1.0.0")
          echo "latest_tag=${latest_tag}" >> $GITHUB_OUTPUT

      - name: Determine version bump from commits
        id: version
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.previoustag.outputs.latest_tag }}"
          prev_tag="${{ steps.previoustag.outputs.latest_tag }}"
          commits=$(git log ${prev_tag}..HEAD --pretty=format:"%s%n%b" --no-merges)

          if echo "$commits" | grep -qiE 'BREAKING CHANGE:|^[a-z]+\!:'; then
            major=$((major + 1))
            minor=0
            patch=0
          elif echo "$commits" | grep -qiE '^feat(\(.+\))?:'; then
            minor=$((minor + 1))
            patch=0
          else
            patch=$((patch + 1))
          fi

          echo "version=${major}.${minor}.${patch}" >> $GITHUB_OUTPUT

      - name: Set up Git and Push Tag
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git remote set-url origin https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Generate release notes
        id: notes
        run: |
          prev_tag="${{ steps.previoustag.outputs.latest_tag }}"
          delimiter="$(openssl rand -hex 8)"
          echo "body<<${delimiter}" >> $GITHUB_OUTPUT
          echo "## What's Changed" >> $GITHUB_OUTPUT
          git log ${prev_tag}..HEAD --pretty=format:"- %s (%h)" --no-merges >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${prev_tag}...${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT
          echo "${delimiter}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

  build-and-push:
    needs: create-tag-release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            tinkeshwar/video-optimizer-ai:latest
            tinkeshwar/video-optimizer-ai:${{ needs.create-tag-release.outputs.version }}
          cache-from: type=registry,ref=tinkeshwar/video-optimizer-ai:latest
          cache-to: type=inline

